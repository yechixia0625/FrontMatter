services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
      args:
        HTTP_PROXY: ${DOCKER_BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${DOCKER_BUILD_HTTPS_PROXY:-}
        NO_PROXY: ${DOCKER_BUILD_NO_PROXY:-localhost,127.0.0.1,::1}
    command: uvicorn src.app_factory:create_app --factory --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    environment:
      LEASENS_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/leaselens
      LEASENS_REDIS_URL: redis://redis:6379/0
      HTTP_PROXY: ${DOCKER_RUNTIME_HTTP_PROXY:-}
      HTTPS_PROXY: ${DOCKER_RUNTIME_HTTPS_PROXY:-}
      NO_PROXY: ${DOCKER_RUNTIME_NO_PROXY:-localhost,127.0.0.1,::1,db,redis}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/src:/app/src
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      network: host
      args:
        HTTP_PROXY: ${DOCKER_BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${DOCKER_BUILD_HTTPS_PROXY:-}
        NO_PROXY: ${DOCKER_BUILD_NO_PROXY:-localhost,127.0.0.1,::1}
    command: npm run dev
    environment:
      - API_PROXY_TARGET=http://api:8000
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules
    depends_on:
      - api

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: leaselens
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "${PUBLIC_HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.portable.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web

volumes:
  pgdata:
  redisdata:
